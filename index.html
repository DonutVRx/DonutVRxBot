<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DonutVRx Bot Legal</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #eee;
    max-width: 900px;
    margin: auto;
    padding: 30px;
    line-height: 1.6;
}

.card {
    background: #1b1b1b;
    padding: 25px;
    border-radius: 12px;
}

h1, h2 {
    color: #5865F2;
}

a {
    color: #5865F2;
}
</style>
</head>

<body>

<div class="card" id="content"></div>

<script>
const page = window.location.pathname.toLowerCase();

let content = "";

if (page.includes("tos")) {

content = `
<h1>DonutVRx Bot</h1>
<h2>Terms of Service</h2>

<!-- PUT YOUR TOS HERE -->

<p>
Your Terms of Service goes here.
</p>

`;

} else if (page.includes("privacy")) {

content = `
<h1>DonutVRx Bot</h1>
<h2>Privacy Policy</h2>

<!-- PUT YOUR PRIVACY POLICY HERE -->

<p>
Your Privacy Policy goes here.
</p>

`;

} else {

content = `
<h1>DonutVRx Bot</h1>

<p>Select a page:</p>

<ul>
<li><a href="tos">Terms of Service</a></li>
<li><a href="privacy">Privacy Policy</a></li>
</ul>
`;

}

document.getElementById("content").innerHTML = content;
</script>

</body>
</html>
